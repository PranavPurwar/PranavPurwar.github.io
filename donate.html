<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate | invokevirtual</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;800&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --panel: #111114;
      --border: #222226;
      --accent: #6366f1;
      --text-main: #ffffff;
      --text-dim: #71717a;
    }

    * {
      box-sizing: border-box;
      transition: 0.15s ease;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0;
    }

    .header p {
      color: var(--text-dim);
      font-size: 14px;
      margin-top: 6px;
    }

    .primary-action {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    .primary-action:hover {
      border-color: var(--accent);
      background: #16161c;
      transform: translateY(-2px);
    }

    .icon-box {
      width: 44px;
      height: 44px;
      background: #1a1a20;
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .primary-info {
      flex: 1;
    }

    .primary-info strong {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .primary-info span {
      font-size: 12px;
      color: var(--text-dim);
    }

    .divider {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      color: #333;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #1a1a1a;
      margin-left: 12px;
    }

    .terminal {
      background: #0d0d10;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }

    .tab {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
    }

    .tab:hover {
      border-color: #333;
      color: #eee;
    }

    .tab.active {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .display-well {
      background: #050505;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #161616;
    }

    .net-tag {
      font-size: 9px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .address {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      word-break: break-all;
      color: #ccc;
      line-height: 1.5;
    }

    .qr-section {
      display: none;
      margin-bottom: 16px;
      text-align: center;
    }

    .qr-frame {
      background: #fff;
      border-radius: 8px;
      display: inline-block;
      overflow: hidden;
      line-height: 0;
    }

    .qr-frame img {
      width: 160px;
      height: auto;
      display: block;
    }

    .btn-upi {
      background: #0f53a4;
      color: white;
      text-decoration: none;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .btn-upi:hover {
      background: #1d69c6;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .btn-copy {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #222;
      background: #16161a;
      color: #fff;
    }

    .btn-copy:hover {
      background: #1c1c22;
      border-color: #444;
    }

    #toast {
      position: fixed;
      bottom: 30px;
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 11px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <div id="toast">COPIED</div>

  <div class="container">
    <div class="header">
      <h1>Support.</h1>
      <p>Help fund the open-source mission.</p>
    </div>

    <a href="https://opencollective.com/invokevirtual" target="_blank" class="primary-action">
      <div class="icon-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
      </div>
      <div class="primary-info">
        <strong>Card or PayPal</strong>
        <span>Instant via Open Collective</span>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" opacity="0.4">
        <path d="M9 18l6-6-6-6" />
      </svg>
    </a>

    <div class="divider">Crypto & UPI</div>

    <div class="terminal">
      <div class="tabs">
        <div class="tab" data-id="upi" onclick="switchTab('upi', this)">UPI</div>
        <div class="tab" data-id="btc" onclick="switchTab('btc', this)">BTC</div>
        <div class="tab" data-id="eth" onclick="switchTab('eth', this)">ETH</div>
        <div class="tab" data-id="sol" onclick="switchTab('sol', this)">SOL</div>
        <div class="tab" data-id="xmr" onclick="switchTab('xmr', this)">XMR</div>
        <div class="tab" data-id="poly" onclick="switchTab('poly', this)">POLY</div>
      </div>

      <div class="display-well">
        <div id="qr-wrap" class="qr-section">
          <div class="qr-frame">
            <img id="qr-img" src="" alt="QR">
          </div>
        </div>
        <span class="net-tag" id="net-label">Network</span>
        <div class="address" id="addr-box">...</div>
      </div>

      <a href="upi://pay?pa=pranavpurwar@fam&pn=Pranav%20Purwar" id="upi-btn" class="btn-upi">Open UPI App</a>
      <button class="btn-copy" onclick="copyAction()">Copy Address</button>
    </div>
  </div>

  <script>
    const wallets = {
      btc: { addr: "bc1q3eesyfn7lhql4c2khv56cyvw2374zkhe7r97hz", net: "Bitcoin Mainnet", qr: null },
      eth: { addr: "0xD80A8D6E0fa433A8bDFC2D3F325159Db70605816", net: "Ethereum Network", qr: null },
      sol: { addr: "7FxTAJLmhXFp6wxVbUTpf8jDmzEX1CKVMdE8oLPNQvyb", net: "Solana Network", qr: null },
      xmr: { addr: "848dAWBVk8GMaoRHg6HUP5CbkpY9pJra1KNQAo9yJ6vbJLFsjFD8ZHkGpi6FhVY7rsD4U9iR7brk64eknsC3bS7tV9JRU4f", net: "Monero Privacy", qr: null },
      upi: { addr: "pranavpurwar@fam", net: "UPI / Scan to Pay", qr: "https://github.com/PranavPurwar/Reef/raw/refs/heads/main/upi.jpeg" },
      poly: { addr: "0xD80A8D6E0fa433A8bDFC2D3F325159Db70605816", net: "Polygon (PoS)", qr: null }
    };

    function switchTab(id, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      const data = wallets[id];
      document.getElementById('addr-box').innerText = data.addr;
      document.getElementById('net-label').innerText = data.net;
      document.getElementById('upi-btn').style.display = (id === 'upi') ? 'flex' : 'none';
      const qrWrap = document.getElementById('qr-wrap');
      if (data.qr) {
        document.getElementById('qr-img').src = data.qr;
        qrWrap.style.display = 'block';
      } else { qrWrap.style.display = 'none'; }
    }

    function copyAction() {
      const text = document.getElementById('addr-box').innerText;
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }

    window.onload = () => {
      const isIN = /en-IN|hi|mr|ta|te|kn|ml|gu|bn|pa|or|as|ne|ur/i.test(navigator.language);
      const def = isIN ? 'upi' : 'btc';
      switchTab(def, document.querySelector(`[data-id="${def}"]`));
    };
  </script>
</body>

</html>
